<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Login | Sign-in</title>
</head>
<body>
    
    <form method="post">
        <div class="container-geral">

            <div class="formContainer">

                <div id="loginContainer" class="loginContainer">
                    <h1>Login</h1>
                    <input type="text" name="username" placeholder="Username">
                    <br>
                    <input type="password" name="password" placeholder="Password">
                    <br>
                    <button class="loginButton" type="button">Entrar</button>
                </div>

                <div id="signContainer" class="signContainer">
                    <h1>Cadastro</h1>
                    <input type="text" name="username" placeholder="Username">
                    <br>
                    <input type="password" name="password" placeholder="Password">
                    <br>
                    <button class="signButton" type="button">Cadastre-se</button>
                </div>
            </div>

            <div id="semloginContainer" class="semloginContainer">
                <h1 id="h1">Ainda não tem cadastro?</h1>
                <button class="newButton" id="newButton" type="button">Cadastrar-se agora!</button>
            </div>
        </div>
    </form>
    <script src="script.js"></script>
</body>
</html>
